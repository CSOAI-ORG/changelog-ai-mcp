name: changelog-ai-mcp
description: MEOK AI Labs MCP Server
version: 1.0.0
tools:
- name: parse_changelog
  description: Parse a Keep-a-Changelog format changelog into structured data.
  parameters:
  - name: content
    type: string
    required: true
- name: generate_entry
  description: Generate a changelog entry in Keep-a-Changelog format.
  parameters:
  - name: version
    type: string
    required: true
  - name: changes
    type: object
    required: true
  - name: release_date
    type: string
    required: false
- name: bump_version
  description: Bump a semantic version number.
  parameters:
  - name: current
    type: string
    required: true
  - name: bump_type
    type: string
    required: false
  - name: prerelease
    type: string
    required: false
- name: compare_versions
  description: Compare two semantic versions and determine their relationship.
  parameters:
  - name: version_a
    type: string
    required: true
  - name: version_b
    type: string
    required: true
